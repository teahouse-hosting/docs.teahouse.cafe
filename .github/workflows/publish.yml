name: Publish

on:
  push:
    branches:
      - trunk
  workflow_dispatch:
  repository_dispatch:

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read  # This is required for actions/checkout

concurrency:
  group: "teahouse"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: ammaraskar/sphinx-action@master
        with:
          pre-build-command: apt-get update -y && apt-get install -y just python3-poetry
          build-command: just install build html
          docs-folder: "."
      - uses: actions/upload-artifact@v4
        with:
          name: website
          path: ./build

  # Deployment job
  deploy:
    environment:
      name: teahouse
      url: https://${{ steps.settings.outputs.bucket }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: website
          path: ./build
      - name: Configure S3
        uses: teahouse-hosting/configure-s3@trunk
        id: settings
        with:
          domain: docs.teahouse.cafe
      - id: install-aws-cli
        uses: unfor19/install-aws-cli-action@v1
      - working-directory: ./build
        run: |
          aws s3 sync --delete . s3://${{steps.settings.outputs.bucket}}
