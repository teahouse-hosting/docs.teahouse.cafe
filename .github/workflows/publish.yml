name: Publish

on:
  push:
  workflow_dispatch:
  repository_dispatch:

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read  # This is required for actions/checkout

concurrency:
  group: "teahouse"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: ammaraskar/sphinx-action@8.2.3
        with:
          pre-build-command: pip install poetry && poetry install
          build-command: poetry run sphinx-build -M html src build
          docs-folder: "."
      - uses: actions/upload-artifact@v4
        with:
          name: website
          path: ./build

  # Deployment job
  deploy:
    if: github.repository == 'teahouse-hosting/docs.teahouse.cafe' && github.ref == 'refs/heads/trunk'
    environment:
      name: teahouse
      url: https://docs.teahouse.cafe
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: website
          path: ./build
      - name: Upload
        uses: teahouse-hosting/upload@trunk
        with:
          domain: docs.teahouse.cafe
          root: ./build/html
